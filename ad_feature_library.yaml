# 广告特征配置
patterns:
  # 1. 关键词行删除（只要包含这些词，整行/整段删除）
  keywords:
    - "长按下方二维码"
    - "关注公众号并回复"
    - "点“在看”"
    - "文章有帮助的话，在看，转发吧"
    - "加入我的知识星球"
    - "加我微信"
    - "关注后回复"
    - "点击领取"
    - "在看点这里"
    - "好文分享给更多人"
    - "长按下方二维码"
  # 2. 链接黑名单（包含这些域名的链接块删除）
  link_domains:
    - "mp.weixin.qq.com/s"
    - "doc.iocoder.cn"
    - "github.com/YunaiV"
  # 3. 结构化块（匹配特定的 Markdown 组合）
  # 使用 re.S 模式，允许 . 匹配换行
  regex_blocks:
    - '最近有一些小伙伴.*?欢迎下载！'
    - '\[\*\*专属福利\*\*\].*?Java面试题库.*?redirect\)'
    - '> 基于 Spring.*?视频教程：.*?(\n>.*)*'